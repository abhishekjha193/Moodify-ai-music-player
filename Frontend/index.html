<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="MindTunes - logo.png" type="image/x-icon" />
    <title>MindTunes</title>
    <style>
  #loader {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #0a0a0a, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .loader-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .music-core {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 122, 0, 0.25), rgba(255, 122, 0, 0.05));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: #ff7a00;
    box-shadow: 0 0 60px rgba(255, 122, 0, 0.35);
    position: relative;
    z-index: 2;
    animation: float 2.2s ease-in-out infinite;
  }

  .pulse-ring {
    position: absolute;
    width: 180px;
    height: 180px;
    border: 2px solid rgba(255, 122, 0, 0.35);
    border-radius: 50%;
    animation: pulse 2.4s infinite ease-out;
  }

  .pulse-ring.delay {
    animation-delay: 1.2s;
  }

  .loading-text {
    color: #ffffff;
    font-size: 16px;
    letter-spacing: 2px;
    font-weight: 600;
  }

  .sub-text {
    color: rgba(255, 255, 255, 0.45);
    font-size: 14px;
  }

  @keyframes pulse {
    0% {
      transform: scale(0.8);
      opacity: 0.8;
    }
    100% {
      transform: scale(1.8);
      opacity: 0;
    }
  }

  @keyframes float {
    0%,
    100% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-8px);
    }
  }
</style>

<body>
  <div id="loader">
    <div class="loader-container">
      <div class="pulse-ring"></div>
      <div class="pulse-ring delay"></div>

      <div class="music-core">🎧</div>

      <div class="loading-text">MindTunes</div>
      <div class="sub-text">Loading...</div>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
